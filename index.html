<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jhasper Serrano | Portfolio </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0ffdf;
      --panel: #f9d0d6;
      --cream: #0d2f14;
      --gold: #4f9f3f;
      --bronze: #d57f91;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: "Cormorant Garamond", serif;
      overflow: hidden;
      cursor: none;
    }

    button, a { cursor: none; }
    button { font: inherit; }
    a { color: inherit; text-decoration: none; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bronze); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--bg);
    }

    .mono { font-family: "DM Mono", monospace; }
    .display { font-family: "Bebas Neue", sans-serif; }
    .hidden { display: none !important; }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 9990;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      animation: grainShift 0.08s steps(1) infinite;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .cursor-dot,
    .cursor-ring {
      position: fixed;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border-radius: 999px;
      z-index: 9999;
    }

    .cursor-dot {
      width: 8px;
      height: 8px;
      background: var(--gold);
    }

    .cursor-ring {
      width: 32px;
      height: 32px;
      border: 1px solid var(--bronze);
      z-index: 9998;
      transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
    }

    .cursor-ring.hovering {
      width: 48px;
      height: 48px;
      border-color: var(--gold);
    }

    .letterbox {
      position: fixed;
      left: 0;
      right: 0;
      height: 0;
      background: var(--bg);
      z-index: 9991;
      pointer-events: none;
      transition: height 1s ease;
    }

    .letterbox.top { top: 0; }
    .letterbox.bottom { bottom: 0; }
    .letterbox.active { height: 80px; }

    .corner {
      position: fixed;
      width: 24px;
      height: 24px;
      z-index: 9992;
      border-color: rgba(79, 159, 63, 0.3);
      pointer-events: none;
    }

    .corner.tl { top: 16px; left: 16px; border-top: 2px solid; border-left: 2px solid; }
    .corner.tr { top: 16px; right: 16px; border-top: 2px solid; border-right: 2px solid; }
    .corner.bl { bottom: 16px; left: 16px; border-bottom: 2px solid; border-left: 2px solid; }
    .corner.br { bottom: 16px; right: 16px; border-bottom: 2px solid; border-right: 2px solid; }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 8000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity 0.8s ease;
    }

    .intro.fade-out { opacity: 0; pointer-events: none; }

    .scanline {
      position: fixed;
      inset: 0;
      z-index: 8001;
      pointer-events: none;
      background: linear-gradient(transparent 50%, rgba(79, 159, 63, 0.03) 50%);
      background-size: 100% 4px;
      animation: scanline 8s linear infinite;
    }

    .director-frame {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 48px;
    }

    .director-frame rect {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
    }

    .intro.phase-1 .director-frame rect { animation: strokeDraw 2.5s ease forwards; }
    .frame-mark {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--gold);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .intro.phase-1 .frame-mark { opacity: 1; }
    .frame-mark.tl { top: 0; left: 0; border-top: 1px solid; border-left: 1px solid; }
    .frame-mark.tr { top: 0; right: 0; border-top: 1px solid; border-right: 1px solid; }
    .frame-mark.bl { bottom: 0; left: 0; border-bottom: 1px solid; border-left: 1px solid; }
    .frame-mark.br { bottom: 0; right: 0; border-bottom: 1px solid; border-right: 1px solid; }

    .intro-logo {
      position: relative;
      width: min-content;
      font-size: clamp(5rem, 15vw, 12rem);
      letter-spacing: 0.2em;
      line-height: 0.9;
    }

    .intro-logo span {
      display: block;
      color: transparent;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s ease, -webkit-text-stroke 0.8s ease;
    }

    .intro-logo span:nth-child(1),
    .intro-logo span:nth-child(2) { position: absolute; inset: 0; }
    .intro-logo span:nth-child(1) { -webkit-text-stroke: 1px var(--gold); transform: translate(-3px, 2px); }
    .intro-logo span:nth-child(2) { -webkit-text-stroke: 1px var(--bronze); transform: translate(3px, -2px); }
    .intro-logo span:nth-child(3) { position: relative; -webkit-text-stroke: 1px transparent; transform: translateY(20px); }
    .intro.phase-2 .intro-logo span:nth-child(1),
    .intro.phase-2 .intro-logo span:nth-child(2) { opacity: 0.3; }
    .intro.phase-2 .intro-logo span:nth-child(3) { opacity: 1; transform: translateY(0); -webkit-text-stroke-color: var(--cream); }

    .intro-line {
      width: 200px;
      height: 1px;
      margin: 32px 0;
      opacity: 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      transition: opacity 0.5s ease;
    }

    .intro.phase-2 .intro-line { opacity: 1; }
    .intro.phase-3 .intro-line { animation: textGlitch 0.3s ease 2; }

    .intro-subtitle,
    .intro-year {
      text-align: center;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .intro-subtitle {
      color: var(--bronze);
      font-size: 0.7rem;
      letter-spacing: 0.5em;
      transform: translateY(10px);
    }

    .intro-year {
      margin-top: 8px;
      color: rgba(79, 159, 63, 0.5);
      font-size: 0.6rem;
      letter-spacing: 0.4em;
    }

    .intro.phase-3 .intro-subtitle,
    .intro.phase-4 .intro-year { opacity: 1; transform: translateY(0); }

    .countdown {
      position: absolute;
      left: 50%;
      bottom: 64px;
      display: flex;
      gap: 12px;
      transform: translateX(-50%);
    }

    .countdown span {
      width: 8px;
      height: 8px;
      border: 1px solid var(--bronze);
      border-radius: 999px;
      opacity: 0.2;
      transform: scale(0);
      transition: all 0.3s ease;
    }

    .intro.phase-1 .countdown span:nth-child(-n+2),
    .intro.phase-2 .countdown span:nth-child(-n+3),
    .intro.phase-3 .countdown span:nth-child(-n+4),
    .intro.phase-4 .countdown span {
      background: var(--gold);
      opacity: 0.5;
      transform: scale(1);
    }

    .aspect-mark {
      position: absolute;
      bottom: 32px;
      color: rgba(213, 127, 145, 0.6);
      font-size: 0.5rem;
      letter-spacing: 0.3em;
    }

    .aspect-mark.left { left: 32px; }
    .aspect-mark.right { right: 32px; }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9993;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      background: rgba(240, 255, 223, 0.78);
      border-bottom: 1px solid rgba(79, 159, 63, 0.18);
      backdrop-filter: blur(10px);
    }

    .brand {
      color: var(--cream);
      font-size: 1.25rem;
      letter-spacing: 0.2em;
      transition: opacity 0.2s ease;
    }

    .brand:hover { opacity: 0.8; }

    .nav ul {
      display: flex;
      gap: 32px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .nav button,
    .scene-dots button {
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
    }

    .nav button {
      position: relative;
      color: rgba(13, 47, 20, 0.82);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .nav button::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -8px;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.3s ease;
    }

    .nav button:hover { color: var(--cream); }
    .nav button.active { color: var(--cream); }
    .nav button.active::after,
    .nav button:hover::after { width: 100%; }

    .scene-count {
      color: rgba(13, 47, 20, 0.7);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
    }

    .scene-count strong { color: var(--cream); font-weight: 400; }

    .scene-dots {
      position: fixed;
      left: 24px;
      top: 50%;
      z-index: 7000;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transform: translateY(-50%);
    }

    .scene-dots button {
      display: flex;
      align-items: center;
      gap: 16px;
      color: rgba(13, 47, 20, 0.78);
    }

    .scene-dots span:first-child {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateX(-8px);
      transition: all 0.3s ease;
    }

    .scene-dots button:hover span:first-child,
    .scene-dots button.active span:first-child {
      opacity: 1;
      transform: translateX(0);
    }

    .scene-dots button.active span:first-child {
      color: var(--cream);
      font-weight: 700;
    }
    .scene-dots .dot {
      width: 9px;
      height: 9px;
      border: 1.5px solid var(--bronze);
      border-radius: 999px;
      transition: all 0.3s ease;
    }

    .scene-dots button.active .dot {
      background: var(--cream);
      border-color: var(--cream);
      transform: scale(1.25);
    }

    #scene-container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    .scene {
      position: absolute;
      inset: 0;
      display: none;
      opacity: 0;
      animation: sceneIn 0.8s ease forwards;
    }

    .scene.active { display: flex; }
    .scene.dark { background: var(--panel); }

    .scene-inner {
      width: min(1100px, calc(100% - 96px));
      margin: auto;
    }

    .scene-kicker {
      display: block;
      color: var(--gold);
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }

    .scene-title {
      margin: 8px 0 0;
      color: var(--cream);
      font-size: clamp(2.8rem, 6vw, 5rem);
      letter-spacing: 0.08em;
      line-height: 0.95;
      font-weight: 400;
    }

    .scene-subtitle {
      margin: 8px 0 0;
      color: rgba(13, 47, 20, 0.78);
      font-style: italic;
      font-size: 1.15rem;
    }

    .scene-label {
      position: absolute;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      color: rgba(213, 127, 145, 0.65);
      font-size: 0.5rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .home {
      align-items: center;
      justify-content: center;
      padding: 48px;
      text-align: center;
    }

    .home-content {
      max-width: 800px;
      animation: sceneIn 0.8s ease forwards;
    }

    .home .eyebrow {
      margin: 0 0 24px;
      color: var(--gold);
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
    }

    .profile-wrap {
      position: relative;
      width: 176px;
      height: 176px;
      margin: 0 auto 40px;
    }

    .profile-wrap::before {
      content: "";
      position: absolute;
      inset: -16px;
      border: 1px solid rgba(79, 159, 63, 0.2);
      border-radius: 999px;
      animation: ringPulse 3s ease-in-out infinite;
    }

    .profile-wrap img {
      width: 100%;
      height: 100%;
      border: 1px solid var(--bronze);
      border-radius: 999px;
      object-fit: cover;
      filter: grayscale(30%);
      box-shadow: 0 0 80px rgba(79,159,63,0.12), 0 0 0 8px rgba(79,159,63,0.06);
    }

    .hero-title {
      margin: 0;
      font-size: clamp(4.5rem, 13vw, 11rem);
      letter-spacing: 0.06em;
      line-height: 0.88;
      font-weight: 400;
    }

    .stroke {
      color: transparent;
      -webkit-text-stroke: 1px var(--gold);
    }

    .tagline {
      max-width: 600px;
      margin: 32px auto 0;
      color: rgba(31, 75, 37, 0.62);
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-style: italic;
    }

    .cta-row, .social-row {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .cta-row { margin-top: 48px; }
    .social-row { margin-top: 40px; gap: 28px; }
    .home .social-row { margin-top: 28px; }

    .btn {
      border: 1px solid var(--bronze);
      padding: 16px 32px;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .btn.primary {
      border-color: var(--gold);
      background: var(--gold);
      color: var(--cream);
    }

    .btn.secondary {
      background: transparent;
      color: var(--gold);
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: var(--gold);
      color: var(--cream);
    }

    .btn.primary:hover {
      background: var(--cream);
      color: var(--bg);
      border-color: var(--cream);
    }

    .social-row a {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
      color: var(--bronze);
      border: 1px solid rgba(79, 159, 63, 0.22);
      transition: all 0.2s ease;
    }

    .social-row a:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(79, 159, 63, 0.08);
      transform: translateY(-4px);
    }

    .social-row svg {
      width: 18px;
      height: 18px;
      display: block;
      fill: currentColor;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .about {
      align-items: center;
      justify-content: center;
      padding: 96px 48px;
      overflow-y: auto;
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 64px;
      align-items: center;
    }

    .portrait {
      position: relative;
    }

    .portrait img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      filter: grayscale(20%) contrast(1.1) brightness(0.85);
    }

    .portrait::after {
      content: "";
      position: absolute;
      inset: -12px;
      border: 1px solid var(--bronze);
      pointer-events: none;
    }

    .copy p {
      color: rgba(31, 75, 37, 0.74);
      font-size: 1.15rem;
      line-height: 1.7;
    }

    .copy strong { color: var(--gold); }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }

    .chips span {
      border: 1px solid var(--bronze);
      color: var(--gold);
      padding: 8px 16px;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .education {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      margin-top: 48px;
      background: var(--bronze);
    }

    .education div {
      background: var(--panel);
      padding: 20px;
      text-align: center;
    }

    .education span {
      display: block;
      margin-bottom: 8px;
      color: var(--gold);
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .muted { color: rgba(31, 75, 37, 0.52); }

    .skills,
    .reflection {
      align-items: center;
      justify-content: center;
      padding: 96px 48px;
      overflow-y: auto;
    }

    .skill-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      margin-top: 56px;
      background: rgba(79, 159, 63, 0.14);
    }

    .skill-card {
      background: var(--bg);
      padding: 36px;
    }

    .skill-card.wide { grid-column: 1 / -1; }

    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      color: var(--gold);
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }

    .section-head::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(79, 159, 63, 0.22);
    }

    .skill-row { margin-bottom: 20px; }

    .skill-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .skill-meta span:last-child {
      color: var(--bronze);
      font-size: 0.75rem;
    }

    .bar {
      height: 1px;
      background: rgba(31, 75, 37, 0.12);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--bronze), var(--gold));
    }

    .projects {
      flex-direction: column;
      align-items: center;
      padding: 96px 48px;
      overflow-y: auto;
    }

    .project-list {
      width: min(1100px, 100%);
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-top: 40px;
    }

    .project-item {
      position: relative;
      display: grid;
      grid-template-columns: 80px 1fr auto;
      align-items: center;
      gap: 32px;
      padding: 28px 32px;
      overflow: hidden;
      background: var(--panel);
      border: 0;
      color: inherit;
      text-align: left;
      transition: background 0.2s ease;
    }

    .project-item::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 0;
      background: rgba(79, 159, 63, 0.08);
      transition: width 0.4s ease;
    }

    .project-item:hover::before { width: 100%; }
    .project-item > * { position: relative; z-index: 1; }

    .project-no {
      color: rgba(79, 159, 63, 0.18);
      font-size: 2.5rem;
      letter-spacing: 0.05em;
    }

    .project-item h3 {
      margin: 0;
      color: var(--cream);
      font-size: 1.6rem;
      letter-spacing: 0.06em;
      font-weight: 400;
      transition: color 0.2s ease;
    }

    .project-item:hover h3 { color: var(--gold); }
    .project-item p {
      margin: 4px 0 0;
      color: rgba(31, 75, 37, 0.52);
      font-size: 0.95rem;
    }

    .tech {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tech span {
      border: 1px solid rgba(79, 159, 63, 0.2);
      color: var(--bronze);
      padding: 4px 10px;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .arrow {
      color: var(--bronze);
      font-size: 1.4rem;
      transition: all 0.2s ease;
    }

    .project-item:hover .arrow {
      color: var(--gold);
      transform: translateX(6px);
    }

    .achievements {
      width: min(1100px, 100%);
      margin-top: 48px;
    }

    .achievement {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 1px;
      background: var(--panel);
      color: rgba(31, 75, 37, 0.68);
      padding: 16px 24px;
    }

    .achievement span { color: var(--gold); }

    .reflection .scene-inner { max-width: 800px; }

    blockquote {
      margin: 40px 0;
      padding-left: 32px;
      border-left: 2px solid var(--gold);
      color: var(--cream);
      font-size: clamp(1.3rem, 3vw, 2rem);
      font-style: italic;
      line-height: 1.55;
    }

    .reflection p {
      color: rgba(31, 75, 37, 0.68);
      line-height: 1.7;
    }

    .film-strip {
      margin-top: 64px;
      overflow-x: auto;
      padding-bottom: 16px;
    }

    .frames {
      display: flex;
      gap: 1px;
      min-width: max-content;
    }

    .frame {
      position: relative;
      width: 180px;
      overflow: hidden;
      border: 1px solid rgba(79, 159, 63, 0.18);
      transition: border-color 0.2s ease;
    }

    .frame:hover { border-color: var(--gold); }

    .frame::before {
      content: "";
      position: absolute;
      top: 4px;

      transform: scale(1.02);
    }

      padding: 10px 12px;
      color: var(--gold);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
    }

      letter-spacing: 0.06em;
      transition: color 0.2s ease;
      overflow-wrap: anywhere;
    }

    .email:hover { color: var(--gold); }

    .rule {
      width: 64px;
      height: 1px;
      margin: 0 auto;
      background: var(--gold);
    }

    .contact-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
    }

    .contact-meta span:first-child {
      display: block;
      margin-bottom: 8px;
      color: var(--bronze);
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }

    .footer {
      position: absolute;
      left: 48px;
      right: 48px;
      bottom: 0;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 24px 0;
      border-top: 1px solid rgba(79, 159, 63, 0.16);
      color: var(--bronze);
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 8500;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal.active { display: flex; }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(240, 255, 223, 0.95);
      backdrop-filter: blur(5px);
      animation: sceneIn 0.3s ease;
    }

    .modal-content {
      position: relative;
      width: min(700px, 100%);
      max-height: 85vh;
      overflow-y: auto;
      border: 1px solid var(--bronze);
      background: var(--panel);
      padding: 48px;
      animation: modalEnter 0.4s ease;
    }

    .close {
      position: absolute;
      top: 16px;
      right: 16px;
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;

      background: transparent;

      top: 16px;
      left: 16px;
      color: rgba(79, 159, 63, 0.14);
      font-size: 4rem;
    }

    .modal h2 {
      margin: 8px 0;
      color: var(--cream);
      font-size: clamp(2.5rem, 7vw, 3.5rem);
      letter-spacing: 0.06em;
      font-weight: 400;
    }

    .modal img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      margin: 32px 0;
      filter: grayscale(10%);
    }

    .modal h4 {
      margin: 0 0 12px;
      color: var(--gold);
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }

    .modal li {
      color: rgba(31, 75, 37, 0.68);
      line-height: 1.65;
    }

    .modal ul {
      padding: 0;
      list-style: none;
    }

    .modal li::before {
      content: "-";
      margin-right: 8px;
      color: var(--gold);
    }

    @keyframes sceneIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes modalEnter {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes grainShift {
      0% { transform: translate(0,0); }
      25% { transform: translate(-3px,2px); }
      50% { transform: translate(4px,-2px); }
      75% { transform: translate(-2px,3px); }
      100% { transform: translate(3px,-3px); }
    }

    @keyframes strokeDraw {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }

    @keyframes textGlitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, -1px); }
      80% { transform: translate(1px, 1px); }
    }

    @keyframes scanline {
      from { transform: translateY(-100%); }
      to { transform: translateY(100vh); }
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }

    @media (max-width: 900px) {
      html, body, button, a { cursor: auto; }
      .cursor-dot, .cursor-ring { display: none; }
      .nav {
        padding: 16px 20px;
        gap: 18px;
        overflow-x: auto;
      }
      .nav ul {

        gap: 16px;

      .letterbox.active { height: 60px; }
      .scene-inner { width: min(100% - 40px, 1100px); }
      .home, .about, .skills, .projects, .reflection, .contact { padding: 88px 20px; }
      .profile-wrap { width: 144px; height: 144px; }
      .cta-row { flex-direction: column; align-items: stretch; }
      .about-grid, .skill-grid { grid-template-columns: 1fr; }
      .education { grid-template-columns: repeat(2, 1fr); }
      .project-item { grid-template-columns: 1fr; gap: 12px; }
      .project-no, .arrow { display: none; }
      .footer {
        position: static;
        margin-top: 64px;

        align-items: center;
      }
      .scene-label { bottom: 28px; }
      .modal-content { padding: 40px 24px; }
      .modal img { height: 220px; }
    }

    function renderNavigation() {
      document.getElementById("nav-list").innerHTML = navItems.map((item, index) => `<li><button class="mono" data-scene="${index}">${item.label}</button></li>`).join("");

    function navigateTo(index) {
      currentScene = index;
      document.querySelectorAll("[data-scene-panel]").forEach((panel, panelIndex) => {
        panel.classList.toggle("active", panelIndex === index);
        if (panelIndex === index) {
          panel.style.animation = "none";
          panel.offsetHeight;
          panel.style.animation = "";
        }
      });
      document.querySelectorAll("[data-scene]").forEach(button => button.classList.toggle("active", Number(button.dataset.scene) === index));
      document.getElementById("scene-current").textContent = pad(index + 1);
    }

    function openProject(id) {
      const project = projects.find(item => item.id === id);
      const index = projects.indexOf(project);
      const modal = document.getElementById("project-modal");
      modal.innerHTML = `
        <div class="modal-backdrop"></div>
        <article class="modal-content">
          <button class="close" aria-label="Close project details">X</button>
          <div class="modal-no display">${pad(index + 1)}</div>
          <span class="scene-kicker mono">${project.tag}</span>
          <h2 class="display">${project.title}</h2>
          <p><em>${project.subtitle}</em></p>
          <img src="${project.image}" alt="${project.title}">
          <h4 class="mono">Objective</h4>
          <p>${project.objective}</p>
          <h4 class="mono">Key Features</h4>
          <ul>${project.features.map(feature => `<li>${feature}</li>`).join("")}</ul>
          <div class="tech mono">${tags(project.tech)}</div>
        </article>
      `;
      modal.classList.add("active");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeProject() {
      const modal = document.getElementById("project-modal");
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden", "true");
    }

    function setupParticles() {
      const canvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");
      let width = window.innerWidth;
      let height = window.innerHeight;
      const particles = Array.from({ length: 100 }, () => createParticle());

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function createParticle() {
        return {
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 1.5 + 0.3,
          opacity: Math.random() * 0.5 + 0.05,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          life: Math.random() * 500 + 200,
          age: 0
        };
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.age += 1;
          if (p.age > p.life || p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
            Object.assign(p, createParticle());
          }
          const fade = Math.sin((Math.PI * p.age) / p.life);
          ctx.globalAlpha = p.opacity * fade;
          ctx.fillStyle = "#4f9f3f";
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(animate);
      }

      resize();
      window.addEventListener("resize", resize);
      animate();
    }

    function setupCursor() {
      const dot = document.querySelector(".cursor-dot");
      const ring = document.querySelector(".cursor-ring");
      let mouseX = 0;
      let mouseY = 0;
      let ringX = 0;
      let ringY = 0;

      document.addEventListener("mousemove", event => {
        mouseX = event.clientX;
        mouseY = event.clientY;
      });

      document.addEventListener("mouseover", event => {
        if (event.target.closest("button, a, .project-item")) ring.classList.add("hovering");
      });

      document.addEventListener("mouseout", () => ring.classList.remove("hovering"));

      function animate() {
        dot.style.left = `${mouseX}px`;
        dot.style.top = `${mouseY}px`;
        ringX += (mouseX - ringX) * 0.12;
        ringY += (mouseY - ringY) * 0.12;
        ring.style.left = `${ringX}px`;
        ring.style.top = `${ringY}px`;
        requestAnimationFrame(animate);
      }
      animate();
    }

    renderScenes();
    renderNavigation();
    setupParticles();
    setupCursor();

    setTimeout(() => document.getElementById("intro").classList.add("phase-1"), 400);
    setTimeout(() => document.getElementById("intro").classList.add("phase-2"), 1200);
    setTimeout(() => document.getElementById("intro").classList.add("phase-3"), 2000);
    setTimeout(() => document.getElementById("intro").classList.add("phase-4"), 3200);
    setTimeout(() => {
      document.getElementById("intro").classList.add("fade-out");
      document.querySelectorAll(".letterbox").forEach(item => item.classList.add("active"));
      document.getElementById("corners").classList.remove("hidden");
      document.getElementById("nav").classList.remove("hidden");
      document.getElementById("scene-dots").classList.remove("hidden");
      document.getElementById("scene-container").classList.remove("hidden");
      navigateTo(0);
    }, 4500);

    document.addEventListener("click", event => {
      const sceneButton = event.target.closest("[data-scene]");
      if (sceneButton) navigateTo(Number(sceneButton.dataset.scene));

      const projectButton = event.target.closest("[data-project]");
      if (projectButton) openProject(projectButton.dataset.project);

      if (event.target.classList.contains("modal-backdrop") || event.target.classList.contains("close")) {
        closeProject();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeProject();
      if (event.key === "ArrowRight") navigateTo(Math.min(navItems.length - 1, currentScene + 1));
      if (event.key === "ArrowLeft") navigateTo(Math.max(0, currentScene - 1));
    });
  </script>
